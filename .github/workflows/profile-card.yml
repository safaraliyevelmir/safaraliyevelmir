name: Update profile card

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate cards
        env:
          # GH_PAT (classic PAT with repo + read:org) lets the LOC counter see
          # private/organization repos; without it only public repos count.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: safaraliyevelmir
        run: python scripts/generate_card.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git diff --cached --quiet && echo "no changes" || git commit -m "Update profile card"
          git push
